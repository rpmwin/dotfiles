# ── General ───────────────────────────────────────
set -g mouse on                          # scroll + click
set -s escape-time 0                     # no delay on escape
set -g status-interval 5
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── Plugins ───────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'catppuccin/tmux#v2.1.2'  # pin to v2

# ── Continuum ─────────────────────────────────────
set -g @continuum-restore 'on'

# ── Catppuccin v2 config ──────────────────────────
set -g @catppuccin_flavor 'mocha'        # note: no 'u' in v2
set -g @catppuccin_window_status_style "rounded"

# Status bar modules (v2 syntax)
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_right_separator ""

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_battery} #{E:@catppuccin_status_cpu} #{E:@catppuccin_status_date_time}"

# ── TPM — MUST BE LAST LINE ───────────────────────
run '~/.config/tmux/plugins/tpm/tpm'
